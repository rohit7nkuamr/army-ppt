                                        <div className="absolute inset-0 top-[45px] opacity-10 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCI+CjxyZWN0IHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgZmlsbD0ibm9uZSIvPgo8cGF0aCBkPSJNMCAwIEw0MCA0MCBNNDAgMCBMMCA0MCIgc3Ryb2tlPSIjM2IzZDRjIiBzdHJva2Utd2lkdGg9IjAuNSIvPgo8L3N2Zz4=')]"></div>
                                        
                                        <div className="flex-1 relative p-4">
                                            <div className="absolute top-[15%] left-[10%] bg-blue-50 text-blue-700 border border-blue-200 px-2 py-1 rounded shadow-sm text-[10px] font-bold tracking-wider z-10">SECTOR A: CLEAR</div>
                                            <div className="absolute top-[40%] right-[10%] bg-amber-50 text-amber-700 border border-amber-200 px-2 py-1 rounded shadow-sm text-[10px] font-bold tracking-wider z-10">SECTOR B: WARNING</div>
                                            <div className="absolute bottom-[20%] left-[30%] bg-red-100 text-red-700 border border-red-300 px-2 py-1 rounded shadow-md text-[10px] font-bold tracking-wider z-10 animate-pulse">SECTOR C: CRITICAL</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )
                },
                {
                    id: 'summary', // Slide 13
                    title: "Summary of Deliverables & Project Phases",
                    icon: <Database className="w-6 h-6 md:w-8 md:h-8 text-blue-600" />,
                    content: (
                        <div className="flex flex-col h-full justify-center px-2">
                            <div className="overflow-x-auto rounded-xl border border-slate-200 shadow-lg">
                                <table className="w-full text-left border-collapse bg-white">
                                    <thead>
                                        <tr className="bg-blue-50 text-blue-700 font-bold tech-font text-lg border-b border-blue-100">
                                            <th className="p-4 w-1/6">ID</th>
                                            <th className="p-4 w-1/4">Focus Area</th>
                                            <th className="p-4">Simple Explanation</th>
                                        </tr>
                                    </thead>
                                    <tbody className="text-slate-700 divide-y divide-slate-200">
                                        <tr className="hover:bg-slate-50 transition-colors">
                                            <td className="p-4 font-mono text-blue-600">a, b</td>
                                            <td className="p-4 font-semibold text-slate-900">Data Foundation</td>
                                            <td className="p-4 text-sm">Building the digital library for every vehicle.</td>
                                        </tr>
                                        <tr className="hover:bg-slate-50 transition-colors bg-slate-50/50">
                                            <td className="p-4 font-mono text-blue-600">c, d</td>
                                            <td className="p-4 font-semibold text-slate-900">Data Ingestion</td>
                                            <td className="p-4 text-sm">Creating clean data pipelines from workshops and sensors.</td>
                                        </tr>
                                        <tr className="hover:bg-slate-50 transition-colors">
                                            <td className="p-4 font-mono text-blue-600">e, f, l</td>
                                            <td className="p-4 font-semibold text-slate-900">AI Intelligence</td>
                                            <td className="p-4 text-sm">The brain that predicts failures based on terrain, weather, and history.</td>
                                        </tr>
                                        <tr className="hover:bg-slate-50 transition-colors bg-slate-50/50">
                                            <td className="p-4 font-mono text-blue-600">g, h, k</td>
                                            <td className="p-4 font-semibold text-slate-900">Smart Logistics</td>
                                            <td className="p-4 text-sm">Translating predictions into precise spare parts forecasts.</td>
                                        </tr>
                                        <tr className="hover:bg-slate-50 transition-colors">
                                            <td className="p-4 font-mono text-blue-600">j</td>
                                            <td className="p-4 font-semibold text-slate-900">Commander's UI</td>

                    )
                },
                {
                    id: 'qa', // Slide 14
                    title: "",
                    icon: null,
                    content: (
                        <div className="flex flex-col items-center justify-center h-full text-center relative overflow-hidden grid-bg">
                            <div className="absolute inset-0 bg-blue-100/50 blur-3xl rounded-full w-[400px] h-[400px] top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2"></div>
                            
                            <h1 className="text-7xl md:text-9xl font-bold text-slate-900 mb-8 tech-font opacity-90 drop-shadow-sm">Q & A</h1>
                            
                            <div className="bg-white/90 border border-slate-200 p-8 rounded-xl backdrop-blur max-w-lg w-full shadow-xl">
                                <h2 className="text-xl text-blue-600 font-bold mb-6 pb-4 border-b border-slate-200 tech-font uppercase tracking-widest">Contact Information</h2>
                                
                                <div className="space-y-4 text-left">
                                    <div className="text-slate-600">
                                        <p className="font-semibold text-slate-900">PDS-05: AI-Based Preventive Maintenance & Spares Demand Forecasting</p>
                                    </div>
                                    <div className="text-slate-500 pt-2 border-t border-slate-100">
                                        <p className="font-bold text-slate-800">Acornpensy Defense Pvt Ltd</p>
                                        <p className="text-blue-600 mt-1 font-semibold">Anurag Shukla</p>
                                        <p className="font-mono text-sm mt-2 flex items-center"><span className="text-slate-400 w-20">Email:</span> info@acornpensy.com</p>
                                        <p className="font-mono text-sm mt-1 flex items-center"><span className="text-slate-400 w-20">Phone:</span> 9599042226</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )
                }
            ];

            const nextSlide = useCallback(() => {
                setDirection(1);
                setCurrentSlide((prev) => (prev === slides.length - 1 ? prev : prev + 1));
            }, [slides.length]);

            const prevSlide = useCallback(() => {
                setDirection(-1);
                setCurrentSlide((prev) => (prev === 0 ? prev : prev - 1));
            }, []);

            // Keyboard navigation
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'ArrowRight') nextSlide();
                    if (e.key === 'ArrowLeft') prevSlide();
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [nextSlide, prevSlide]);

            // Touch/Swipe handling
            const minSwipeDistance = 50;
            const onTouchStart = (e) => {
                setTouchEnd(null);
                setTouchStart(e.targetTouches[0].clientX);
            };
            const onTouchMove = (e) => setTouchEnd(e.targetTouches[0].clientX);
            const onTouchEnd = () => {
                if (!touchStart || !touchEnd) return;
                const distance = touchStart - touchEnd;
                const isLeftSwipe = distance > minSwipeDistance;
                const isRightSwipe = distance < -minSwipeDistance;
                if (isLeftSwipe) nextSlide();
                if (isRightSwipe) prevSlide();
            };

            return (
                <div className="flex flex-col h-screen w-full p-2 md:p-4 lg:p-6 overflow-hidden">
                    {/* Presentation Container */}
                    <div 
                        className="flex-1 bg-white rounded-2xl shadow-[0_4px_40px_rgba(0,0,0,0.08)] border border-slate-200 flex flex-col overflow-hidden relative max-w-6xl mx-auto w-full"
                        onTouchStart={onTouchStart}
                        onTouchMove={onTouchMove}
                        onTouchEnd={onTouchEnd}
                    >
                        
                        {/* Header (Hidden on Title, Challenges & Q&A Slides) */}
                        {slides[currentSlide].id !== 'title' && slides[currentSlide].id !== 'qa' && slides[currentSlide].id !== 'challenges' && (
                            <div className="px-4 md:px-8 py-4 border-b border-slate-200 flex items-center justify-between bg-white/90 backdrop-blur z-20 shrink-0">
                                <div className="flex items-center space-x-3 min-w-0">
                                    <div className="p-2 bg-slate-50 rounded border border-slate-200 hidden sm:block">
                                        {slides[currentSlide].icon}
                                    </div>
                                    <h2 className="text-lg md:text-xl font-bold text-slate-900 truncate tech-font tracking-wide">{slides[currentSlide].title}</h2>
                                </div>
                                <div className="flex items-center space-x-2 text-slate-500 shrink-0 ml-4 border-l border-slate-200 pl-4">
                                    <ShieldCheck className="w-5 h-5 hidden sm:block" />
                                    <span className="text-xs font-bold tracking-widest uppercase hidden sm:block tech-font">Project Sentinel</span>
                                </div>
                            </div>
                        )}

                        {/* Content Area with Animation */}
                        <div className="flex-1 p-4 md:p-8 overflow-y-auto relative bg-slate-50 z-10">
                            <div 
                                key={currentSlide}
                                className={`h-full ${direction > 0 ? 'animate-slide-left' : 'animate-slide-right'}`}
                                style={{ animation: 'fadeIn 0.3s ease-out' }}
                            >
                                {slides[currentSlide].content}
                            </div>
                        </div>

                        {/* Footer / Controls */}
                        <div className="px-4 md:px-6 py-3 bg-white/90 border-t border-slate-200 flex items-center justify-between z-20 shrink-0 backdrop-blur">
                            <div className="text-slate-500 text-xs font-bold tracking-widest uppercase truncate tech-font flex items-center">
                                <span className="w-2 h-2 rounded-full bg-blue-600 mr-2 shadow-sm"></span>
                                Acornpensy Defense
                            </div>
                            
                            <div className="flex items-center space-x-4 md:space-x-6">
                                <button 
                                    onClick={prevSlide}
                                    disabled={currentSlide === 0}
                                    className="p-2 rounded hover:bg-slate-100 border border-transparent hover:border-slate-300 disabled:opacity-30 disabled:hover:bg-transparent disabled:hover:border-transparent transition-all text-blue-600"
                                    aria-label="Previous slide"
                                >
                                    <ChevronLeft className="w-5 h-5" />
                                </button>
                                <span className="text-sm font-mono text-slate-600 bg-slate-100 px-3 py-1 rounded border border-slate-200">
                                    <span className="text-blue-600 font-bold">{currentSlide + 1}</span> / {slides.length}
                                </span>
                                <button 
                                    onClick={nextSlide}
                                    disabled={currentSlide === slides.length - 1}
                                    className="p-2 rounded hover:bg-slate-100 border border-transparent hover:border-slate-300 disabled:opacity-30 disabled:hover:bg-transparent disabled:hover:border-transparent transition-all text-blue-600"
                                    aria-label="Next slide"
                                >
                                    <ChevronRight className="w-5 h-5" />
                                </button>
                            </div>
                        </div>
                        
                        {/* Progress Bar */}
                        <div className="h-1 w-full bg-slate-200 absolute bottom-0 left-0 z-30">
                            <div 
                                className="h-full bg-blue-600 transition-all duration-300 ease-out shadow-[0_0_8px_rgba(37,99,235,0.6)]"
                                style={{ width: `${((currentSlide + 1) / slides.length) * 100}%` }}
                            ></div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
